<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-Q4oKjVqXk75M8Ix1+8dGgZq8F6Q1QHdPn9XcLlgZ+32lWgE0zOPvZ/MEzK15E1Vt" crossorigin="anonymous">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="module" src="./src/main.ts"></script>
  <script type="module" src="./src/functions/crearProducto.ts"></script>
  <script type="module" src="./src/functions/borrarProducto.ts"></script>
  <script type="module" src="./src/functions/editForm.ts"></script>
  <script type="module" src="./src/functions/editarProducto.ts"></script>



  <title>web</title>
</head>

<body>
  <div id="app"></div>
  <button type="button" id="create" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal">
    crea
  </button>
  <div id="modal" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Crear producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
          <form action="" id="crear">
            <input type="text" name="nombre" id="nombre" placeholder="Mueble" required class="form-control mb-2">
            <input type="number" name="proveedor" id="proveedor" placeholder="1-10" required class="form-control mb-2">
            <input type="number" name="categoria" id="categoria" placeholder="1-10" required class="form-control mb-2">
            <div class="modal-footer">
              <p id="createState">???</p>
              <button type="submit" class="btn btn-primary" id="send">Enviar</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>
          </form>
        </div>



      </div>
    </div>
  </div>


  <div id="modal2" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Editar Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
          <form action="" id="editar">
            <input type="text" placeholder="Mueble" id="editName" required class="form-control mb-2">
            <input type="number" placeholder="1-10" id="editSupplier" required class="form-control mb-2">
            <input type="number" placeholder="1-10" id="editCategory" required class="form-control mb-2">
            <div class="modal-footer">
              <p id="editState">???</p>
              <button type="submit" class="btn btn-primary" id="saveEdit">Enviar</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>
          </form>
        </div>



      </div>
    </div>
  </div>






</body>

</html>
