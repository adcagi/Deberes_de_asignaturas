version: '3.9'
services:
  db:
    image: mysql:8.1
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: products
      MYSQL_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "3308:3308"

    volumes:
      -db_data:/var/lib/mysql

volumes:
  db_data: